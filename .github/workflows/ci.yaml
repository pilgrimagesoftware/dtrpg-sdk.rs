name: CI

on:
  push:
    branches:
      - master
      - develop
    paths:
      - "src/**/*.rs"
      - .rust-version
      - Cargo.toml
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: Build/test on ${{ matrix.name }}

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get Rust version
        id: get_rust_version
        run: |
              echo "rust_version=$(cat .rust-version)" >> $GITHUB_OUTPUT

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.get_rust_version.outputs.rust_version }}
          components: clippy, rustfmt

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        uses: actions-rs/cargo@v1
        with:
          use-cross: true
          command: build
          args: --verbose --release --target ${{ matrix.target }}

      - name: Test
        uses: actions-rs/cargo@v1
        with:
          use-cross: true
          command: test
          args: --verbose --release --target ${{ matrix.target }}

      - name: Package
        uses: actions-rs/cargo@v1
        with:
          use-cross: true
          command: package
          args: --verbose --no-verify --allow-dirty

      - name: Bump version and push tag
        id: bump_version
        uses: anothrNick/github-tag-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: false
          DEFAULT_BUMP: patch

      - name: Commit and push
        run: |
              git config --global user.email "ci@pilgrimagesoftware.com"
              git config --global user.name "Pilgrimage Software CI"
              sed -i 's/^version = ".*"$/version = "'${{ steps.bump_version.outputs.new_tag }}'"/' Cargo.toml
              git add Cargo.toml
              git commit -m "Update Cargo.toml on ${{ github.ref_name }} with version: ${{ steps.bump_version.outputs.new_tag }} [skip ci]"
              git push origin

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: crate-${{ github.sha }}
          path: target/package/*.crate
          retention-days: 30

      - name: Run release-plz
        uses: release-plz/action@v0.5.17
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_API_KEY }}
