name: Build and Release

on:
    push:
        branches:
            - master
            - develop
        paths:
            - "src/**/*.rs"
            - .rust-version
            - Cargo.toml
    workflow_dispatch:

env:
    CARGO_TERM_COLOR: always

permissions:
    contents: write
    pages: write
    id-token: write

jobs:
    build:
        name: Build/test on ${{ matrix.name }}

        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: Linux
                      os: ubuntu-latest
                      target: x86_64-unknown-linux-musl
                      use-cross: true
                    - name: macOS
                      os: macos-latest
                      target: x86_64-apple-darwin
                      use-cross: false

        steps:
            - name: Checkout
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0
                  fetch-tags: true
                  show-progress: true
                  submodules: recursive

            - name: Set up Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Cache dependencies
              uses: Swatinem/rust-cache@v2

            - name: Build (release)
              uses: actions-rs/cargo@v1
              with:
                  use-cross: ${{ matrix.use-cross }}
                  command: build
                  args: --verbose --release --target ${{ matrix.target }}

            - name: Test
              uses: actions-rs/cargo@v1
              with:
                  use-cross: ${{ matrix.use-cross }}
                  command: test
                  args: --verbose --release --target ${{ matrix.target }}

            - name: Bump version and push tag
              id: bump_version
              uses: anothrNick/github-tag-action@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  WITH_V: false
                  DEFAULT_BUMP: patch

            - name: Commit and push
              run: |
                  git config --global user.email "ci@pilgrimagesoftware.com"
                  git config --global user.name "Pilgrimage Software CI"
                  sed -i 's/^version = ".*"$/version = "'${{ steps.bump_version.outputs.new_tag }}'"/' Cargo.toml
                  git add Cargo.toml
                  git commit -m "chore: update Cargo.toml on ${{ github.ref_name }} with version: ${{ steps.bump_version.outputs.new_tag }} [skip ci]"
                  git push origin

            - name: Generate documentation
              run: cargo doc --no-deps --verbose

            - name: Add redirect index
              run: |
                  echo '<meta http-equiv="refresh" content="0; url=dtrpg_sdk/index.html">' \
                    > target/doc/index.html

            - name: Package
              uses: actions-rs/cargo@v1
              with:
                  use-cross: ${{ matrix.use-cross }}
                  command: package
                  args: --verbose --no-verify --allow-dirty

            - name: Upload package artifact
              uses: actions/upload-artifact@v7
              with:
                  name: crate-${{ github.sha }}
                  path: target/package/*.crate
                  retention-days: 30

            - name: Upload documentation artifact
              uses: actions/upload-artifact@v7
              with:
                  name: docs-${{ github.sha }}
                  path: target/doc/
                  retention-days: 30

            - name: Upload Pages artifact
              # if: github.ref == 'refs/heads/master'
              uses: actions/upload-pages-artifact@v5
              with:
                  path: target/doc/

    publish:
        name: Publish crate and create GitHub Release
        needs: build
        if: github.ref == 'refs/heads/master'
        runs-on: ubuntu-latest

        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0
                  fetch-tags: true
                  show-progress: true
                  submodules: recursive

            - name: Set up Rust toolchain
              uses: dtolnay/rust-toolchain@stable

            - name: Read crate version
              id: crate_version
              run: |
                  version=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
                  echo "version=$version" >> "$GITHUB_OUTPUT"

            - name: Download package artifact
              uses: actions/download-artifact@v7
              with:
                  name: crate-${{ github.sha }}
                  path: target/package

            - name: Download documentation artifact
              uses: actions/download-artifact@v7
              with:
                  name: docs-${{ github.sha }}
                  path: target/doc

            - name: Archive documentation
              run: tar -czf docs-${{ steps.crate_version.outputs.version }}.tar.gz -C target/doc .

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.crate_version.outputs.version }}
                  name: v${{ steps.crate_version.outputs.version }}
                  files: |
                      target/package/*.crate
                      docs-${{ steps.crate_version.outputs.version }}.tar.gz
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Publish to crates.io
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_API_KEY }}
              run: cargo publish --verbose

    deploy-docs:
        name: Deploy documentation to GitHub Pages
        needs: build
        # if: github.ref == 'refs/heads/master'
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
