name: Prepare Release

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

concurrency: release

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: psw_ci_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PSW_CI_APP_ID }}
          private-key: ${{ secrets.PSW_CI_PRIVATE_KEY }}

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history required for git-cliff
          fetch-tags: true
          show-progress: true
          submodules: recursive
          persist-credentials: false

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Install cargo-edit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-edit

      - name: Determine next version
        id: version
        run: |
          NEXT_VERSION=$(git-cliff --bumped-version)
          echo "version=${NEXT_VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Bump Cargo.toml
        run: |
          cargo set-version ${{ steps.version.outputs.version }}

      - name: Update changelog
        run: |
          git-cliff --tag v${{ steps.version.outputs.version }} --unreleased --prepend CHANGELOG.md

      # `peter-evans/create-pull-request` (used here previously) cherry-picks
      # only the *uncommitted working-tree diff* as a single synthetic commit
      # onto `base`, rather than merging/rebasing the checked-out branch's
      # actual history. Since this job checks out `develop`, that meant the
      # release PR against `master` carried the version-bump/changelog commit
      # but silently dropped every real commit `develop` was ahead of `master`
      # by — the release PR looked "empty" of the actual changes being
      # released. Branching `release/<version>` directly off `develop`'s tip
      # and committing the bump on top of it (below) preserves that full
      # commit history, so the PR against `master` is a real, complete diff.
      - name: Commit version bump and push release branch
        id: release_branch
        env:
          GH_TOKEN: ${{ steps.psw_ci_token.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/pilgrimagesoftware/dtrpg-sdk.rs"

          BRANCH="release/${{ steps.version.outputs.version }}"
          git checkout -b "$BRANCH"
          git add Cargo.toml Cargo.lock CHANGELOG.md

          if git diff --cached --quiet; then
            echo "::error::Nothing to release at version ${{ steps.version.outputs.version }}."
            echo "::error::git-cliff computed this as the next version, but Cargo.toml and CHANGELOG.md already match what this run would have produced."
            echo "::error::Likely causes: (1) no new conventional commits (feat:/fix:/etc.) have landed on develop since the last release; or (2) no git tag exists yet for a prior release, so git-cliff cannot compute a version relative to history and keeps recomputing the same fallback version on every run (see 'Determine next version' step output above)."
            echo "::error::If (2), a git tag needs to be created for the most recent release before this workflow can advance past ${{ steps.version.outputs.version }}."
            exit 1
          fi

          git commit -m "chore(release): ${{ steps.version.outputs.version }}"
          git push --force origin "$BRANCH"

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Open or update release PR
        id: create_pull_request
        env:
          GH_TOKEN: ${{ steps.psw_ci_token.outputs.token }}
        run: |
          BRANCH="${{ steps.release_branch.outputs.branch }}"
          BODY="Automated release PR. Review the changelog and Cargo.toml version before merging."

          # `gh pr view` matches *any* PR ever associated with this branch
          # name, including closed ones — and GitHub refuses to reopen a PR
          # whose head branch was force-pushed/recreated after closing. Only
          # reuse a match via `gh pr edit` if it's still open; otherwise fall
          # through to `gh pr create`, which works fine even when a closed PR
          # already exists for the same branch.
          EXISTING_STATE=$(gh pr view "$BRANCH" --json state --jq .state 2>/dev/null || echo "NONE")
          if [ "$EXISTING_STATE" = "OPEN" ]; then
            PR_URL=$(gh pr view "$BRANCH" --json url --jq .url)
            gh pr edit "$BRANCH" --title "Release ${{ steps.version.outputs.version }}" --body "$BODY"
          else
            PR_URL=$(gh pr create \
              --base master \
              --head "$BRANCH" \
              --title "Release ${{ steps.version.outputs.version }}" \
              --body "$BODY" \
              --label release \
              --assignee psw-ci \
              --reviewer paulyhedral)
          fi

          echo "pull-request-url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Add PR to DriveThruRPG project
        id: add_pr_to_project
        env:
          GH_TOKEN: ${{ steps.psw_ci_token.outputs.token }}
        run: |
          gh project item-add 8 \
            --owner pilgrimagesoftware \
            --url ${{ steps.create_pull_request.outputs.pull-request-url }}
